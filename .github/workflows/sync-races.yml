name: Sync Races from RunSignup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      states:
        description: 'Comma-separated states to sync (leave blank for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — fetch but do not write to database'
        required: false
        default: 'false'

jobs:
  sync-races:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Write sync script
        run: |
          cat > /tmp/sync.py << 'EOF'
          import sys, json, urllib.request, urllib.error, os
          from datetime import datetime

          RUNSIGNUP_KEY = os.environ['RUNSIGNUP_API_KEY']
          RUNSIGNUP_SECRET = os.environ['RUNSIGNUP_API_SECRET']
          SUPABASE_URL = os.environ['SUPABASE_URL']
          SERVICE_KEY = os.environ['SUPABASE_SERVICE_ROLE_KEY']
          DRY_RUN = os.environ.get('DRY_RUN', 'false') == 'true'
          INPUT_STATES = os.environ.get('INPUT_STATES', '')

          STATES = INPUT_STATES.split(',') if INPUT_STATES else [
            'MD','VA','DC','PA','NY','NJ','DE','WV','NC','SC',
            'GA','FL','TX','CA','IL','OH','MA','CT','CO','WA'
          ]

          STATE_COORDS = {
            'MD':[39.0639,-76.8021],'VA':[37.7693,-78.1699],'DC':[38.8974,-77.0268],
            'PA':[40.5908,-77.2098],'NY':[42.1657,-74.9481],'NJ':[40.2989,-74.5210],
            'DE':[39.3185,-75.5071],'WV':[38.4913,-80.9545],'NC':[35.6301,-79.8064],
            'SC':[33.8569,-80.9450],'GA':[33.0406,-83.6431],'FL':[27.7663,-81.6868],
            'TX':[31.0545,-97.5635],'CA':[36.1162,-119.6815],'IL':[40.3495,-88.9861],
            'OH':[40.3888,-82.7649],'MA':[42.2302,-71.5301],'CT':[41.5978,-72.7554],
            'CO':[39.0598,-105.3111],'WA':[47.4009,-121.4905]
          }

          CITY_COORDS = {
            'Baltimore,MD':[39.2904,-76.6122],'Annapolis,MD':[38.9784,-76.4922],
            'Bethesda,MD':[38.9807,-77.1003],'Rockville,MD':[39.0840,-77.1528],
            'Gaithersburg,MD':[39.1434,-77.2011],'Silver Spring,MD':[38.9907,-77.0261],
            'Columbia,MD':[39.2037,-76.8610],'Frederick,MD':[39.4143,-77.4105],
            'Hagerstown,MD':[39.6418,-77.7199],'Salisbury,MD':[38.3607,-75.5994],
            'Washington,DC':[38.9072,-77.0369],
            'Arlington,VA':[38.8799,-77.1068],'Alexandria,VA':[38.8048,-77.0469],
            'Richmond,VA':[37.5407,-77.4360],'Virginia Beach,VA':[36.8529,-75.9780],
            'Norfolk,VA':[36.8508,-76.2859],'Charlottesville,VA':[38.0293,-78.4767],
            'Roanoke,VA':[37.2710,-79.9414],'Fredericksburg,VA':[38.3032,-77.4605],
            'Philadelphia,PA':[39.9526,-75.1652],'Pittsburgh,PA':[40.4406,-79.9959],
            'Harrisburg,PA':[40.2732,-76.8867],'Allentown,PA':[40.6084,-75.4902],
            'New York,NY':[40.7128,-74.0060],'Buffalo,NY':[42.8864,-78.8784],
            'Rochester,NY':[43.1566,-77.6088],'Albany,NY':[42.6526,-73.7562],
            'Newark,NJ':[40.7357,-74.1724],'Jersey City,NJ':[40.7178,-74.0431],
            'Trenton,NJ':[40.2171,-74.7429],'Atlantic City,NJ':[39.3643,-74.4229],
            'Wilmington,DE':[39.7447,-75.5484],'Dover,DE':[39.1582,-75.5244],
            'Charlotte,NC':[35.2271,-80.8431],'Raleigh,NC':[35.7796,-78.6382],
            'Durham,NC':[35.9940,-78.8986],'Asheville,NC':[35.5951,-82.5515],
            'Columbia,SC':[34.0007,-81.0348],'Charleston,SC':[32.7765,-79.9311],
            'Atlanta,GA':[33.7490,-84.3880],'Savannah,GA':[32.0835,-81.0998],
            'Miami,FL':[25.7617,-80.1918],'Tampa,FL':[27.9506,-82.4572],
            'Orlando,FL':[28.5383,-81.3792],'Jacksonville,FL':[30.3322,-81.6557],
            'Houston,TX':[29.7604,-95.3698],'Austin,TX':[30.2672,-97.7431],
            'Dallas,TX':[32.7767,-96.7970],'San Antonio,TX':[29.4241,-98.4936],
            'Los Angeles,CA':[34.0522,-118.2437],'San Diego,CA':[32.7157,-117.1611],
            'San Francisco,CA':[37.7749,-122.4194],'Sacramento,CA':[38.5816,-121.4944],
            'Chicago,IL':[41.8781,-87.6298],'Springfield,IL':[39.7817,-89.6501],
            'Columbus,OH':[39.9612,-82.9988],'Cleveland,OH':[41.4993,-81.6944],
            'Cincinnati,OH':[39.1031,-84.5120],'Akron,OH':[41.0814,-81.5190],
            'Boston,MA':[42.3601,-71.0589],'Worcester,MA':[42.2626,-71.8023],
            'Hartford,CT':[41.7658,-72.6851],'New Haven,CT':[41.3082,-72.9282],
            'Denver,CO':[39.7392,-104.9903],'Colorado Springs,CO':[38.8339,-104.8214],
            'Boulder,CO':[40.0150,-105.2705],'Fort Collins,CO':[40.5853,-105.0844],
            'Seattle,WA':[47.6062,-122.3321],'Spokane,WA':[47.6588,-117.4260],
            'Tacoma,WA':[47.2529,-122.4443],'Olympia,WA':[47.0379,-122.9007],
          }

          def get_coords(city, state):
            key = f"{city},{state}"
            if key in CITY_COORDS:
              return CITY_COORDS[key]
            return STATE_COORDS.get(state, [None, None])

          def normalize_distance(raw):
            if not raw:
              return None
            r = raw.lower().strip()
            if 'marathon' in r and 'half' not in r:
              return '26.2'
            if 'half' in r or '13.1' in r:
              return '13.1'
            if '10k' in r or r == '10 km':
              return '10K'
            if '5k' in r or r == '5 km':
              return '5K'
            if '10 mi' in r or '10mile' in r:
              return '10 mi'
            if '70.3' in r or 'half iron' in r:
              return '70.3'
            if '140.6' in r:
              return '140.6'
            if '50k' in r:
              return '50K'
            if '50m' in r or '50 mi' in r:
              return '50M'
            if '100k' in r:
              return '100K'
            if 'tri' in r:
              return 'Tri'
            return raw.strip()

          def fetch_races(state, page):
            from datetime import date, timedelta
            today = date.today().isoformat()
            one_year = (date.today().replace(year=date.today().year + 1)).isoformat()
            url = (
              f"https://api.runsignup.com/rest/races"
              f"?api_key={RUNSIGNUP_KEY}&api_secret={RUNSIGNUP_SECRET}"
              f"&format=json&state={state}&results_per_page=100&page={page}"
              f"&start_date={today}&end_date={one_year}&include_event_details=T"
            )
            req = urllib.request.Request(url)
            with urllib.request.urlopen(req, timeout=30) as resp:
              return json.loads(resp.read())

          def upsert_races(records):
            if not records:
              return 0, 0
            payload = json.dumps(records).encode()
            req = urllib.request.Request(
              f"{SUPABASE_URL}/rest/v1/races",
              data=payload,
              headers={
                'apikey': SERVICE_KEY,
                'Authorization': f'Bearer {SERVICE_KEY}',
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates'
              },
              method='POST'
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                return len(records), 0
            except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"  Supabase error {e.code}: {body}", file=sys.stderr)
              return 0, len(records)

          total_added = 0
          total_errors = 0

          for state in STATES:
            state = state.strip()
            print(f"Syncing {state}...")
            state_added = 0
            state_errors = 0
            page = 1

            while page <= 20:
              try:
                data = fetch_races(state, page)
                races = data.get('races', [])
                if not races:
                  break
                print(f"  Page {page}: {len(races)} races fetched")
              except Exception as e:
                print(f"  Fetch error page {page}: {e}", file=sys.stderr)
                break

              normalized = []
              for item in races:
                try:
                  race = item.get('race', item)
                  events = (race.get('next_date') or {}).get('events', []) or race.get('events', [])
                  first_event = events[0].get('event', events[0]) if events else {}

                  race_id = f"rs_{race.get('race_id', '')}"
                  name = race.get('name', '')
                  city = (race.get('address') or {}).get('city', '')
                  st = (race.get('address') or {}).get('state', state)
                  coords = get_coords(city, st)
                  dist_raw = first_event.get('distance', '') or first_event.get('name', '')
                  distance = normalize_distance(dist_raw)

                  date_str = (race.get('next_date') or {}).get('start_time') or race.get('start_time')
                  date_sort = None
                  date_display = None
                  if date_str:
                    try:
                      d = datetime.fromisoformat(date_str.replace('Z', ''))
                      date_sort = d.strftime('%Y-%m-%d')
                      date_display = d.strftime('%b %-d, %Y')
                    except Exception:
                      pass

                  if not name or not date_sort:
                    continue

                  combined = f"{dist_raw} {name}".lower()
                  sport = 'Triathlon' if ('ironman' in combined or 'triathlon' in combined or '70.3' in combined) else 'Running'
                  reg_url = race.get('url', f"https://runsignup.com/Race/{race.get('race_id', '')}")
                  location = f"{city}, {st}" if city and st else (st or city or '')

                  normalized.append({
                    'id': race_id,
                    'source': 'runsignup',
                    'name': name,
                    'location': location,
                    'city': city,
                    'state': st,
                    'lat': coords[0],
                    'lng': coords[1],
                    'distance': distance,
                    'distance_raw': dist_raw,
                    'date': date_display,
                    'date_sort': date_sort,
                    'terrain': 'Road',
                    'sport': sport,
                    'is_past': False,
                    'registration_url': reg_url,
                  })
                except Exception as e:
                  pass

              if normalized and not DRY_RUN:
                for i in range(0, len(normalized), 50):
                  chunk = normalized[i:i+50]
                  added, errors = upsert_races(chunk)
                  state_added += added
                  state_errors += errors

              if len(races) < 100:
                break
              page += 1

            print(f"  {state}: added={state_added} errors={state_errors}")
            total_added += state_added
            total_errors += state_errors

          print(f"=============================")
          print(f"Sync complete: added={total_added} errors={total_errors}")
          print(f"=============================")
          EOF

      - name: Run sync
        env:
          RUNSIGNUP_API_KEY: ${{ secrets.RUNSIGNUP_API_KEY }}
          RUNSIGNUP_API_SECRET: ${{ secrets.RUNSIGNUP_API_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_STATES: ${{ github.event.inputs.states }}
        run: python3 /tmp/sync.py
