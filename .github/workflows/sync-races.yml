name: Sync Races from RunSignup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      states:
        description: 'Comma-separated states to sync (leave blank for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — fetch but do not write to database'
        required: false
        default: 'false'

jobs:
  sync-races:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Sync races state by state
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          INPUT_STATES="${{ github.event.inputs.states }}"
          BASE_URL="https://race-passport-70v7kb0fp-ryans-projects-29f7f58e.vercel.app/api/runsignup"

          if [ -n "$INPUT_STATES" ]; then
            STATES="$INPUT_STATES"
          else
            STATES="MD,VA,DC,PA,NY,NJ,DE,WV,NC,SC,GA,FL,TX,CA,IL,OH,MA,CT,CO,WA"
          fi

          TOTAL_ADDED=0
          TOTAL_ERRORS=0

          IFS=',' read -ra STATE_LIST <<< "$STATES"
          for STATE in "${STATE_LIST[@]}"; do
            echo "Syncing $STATE..."

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              "${BASE_URL}?action=sync_state&state=${STATE}&sync_key=${{ secrets.SYNC_SECRET_KEY }}&dry_run=${DRY_RUN}")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" = "200" ]; then
              ADDED=$(echo "$BODY" | grep -o '"added":[0-9]*' | grep -o '[0-9]*' | head -1 || echo "0")
              ERRORS=$(echo "$BODY" | grep -o '"errors":[0-9]*' | grep -o '[0-9]*' | head -1 || echo "0")
              TOTAL=$(echo "$BODY" | grep -o '"total":[0-9]*' | grep -o '[0-9]*' | head -1 || echo "0")
              echo "  $STATE: fetched=$TOTAL added=$ADDED errors=$ERRORS"
              TOTAL_ADDED=$((TOTAL_ADDED + ADDED))
              TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            else
              echo "  $STATE: FAILED with HTTP $HTTP_CODE"
              echo "  Response: $BODY"
              TOTAL_ERRORS=$((TOTAL_ERRORS + 1))
            fi

            sleep 2
          done

          echo "============================="
          echo "Sync complete: added=$TOTAL_ADDED errors=$TOTAL_ERRORS"
          echo "============================="
