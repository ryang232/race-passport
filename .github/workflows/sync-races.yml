name: Sync Races from RunSignup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      states:
        description: 'Comma-separated states to sync (leave blank for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — fetch but do not write to database'
        required: false
        default: 'false'

jobs:
  sync-races:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Write sync script
        run: |
          cat > /tmp/sync.py << 'EOF'
          import sys, json, urllib.request, urllib.error, os
          from datetime import datetime, date, timedelta

          RUNSIGNUP_KEY = os.environ['RUNSIGNUP_API_KEY']
          RUNSIGNUP_SECRET = os.environ['RUNSIGNUP_API_SECRET']
          SUPABASE_URL = os.environ['SUPABASE_URL'].rstrip('/')
          SERVICE_KEY = os.environ['SUPABASE_SERVICE_ROLE_KEY']
          DRY_RUN = os.environ.get('DRY_RUN', 'false') == 'true'
          INPUT_STATES = os.environ.get('INPUT_STATES', '').strip()

          STATES = [s.strip() for s in INPUT_STATES.split(',')] if INPUT_STATES else [
            'MD','VA','DC','PA','NY','NJ','DE','WV','NC','SC',
            'GA','FL','TX','CA','IL','OH','MA','CT','CO','WA'
          ]

          STATE_COORDS = {
            'MD':[39.0639,-76.8021],'VA':[37.7693,-78.1699],'DC':[38.8974,-77.0268],
            'PA':[40.5908,-77.2098],'NY':[42.1657,-74.9481],'NJ':[40.2989,-74.5210],
            'DE':[39.3185,-75.5071],'WV':[38.4913,-80.9545],'NC':[35.6301,-79.8064],
            'SC':[33.8569,-80.9450],'GA':[33.0406,-83.6431],'FL':[27.7663,-81.6868],
            'TX':[31.0545,-97.5635],'CA':[36.1162,-119.6815],'IL':[40.3495,-88.9861],
            'OH':[40.3888,-82.7649],'MA':[42.2302,-71.5301],'CT':[41.5978,-72.7554],
            'CO':[39.0598,-105.3111],'WA':[47.4009,-121.4905]
          }

          CITY_COORDS = {
            'Baltimore,MD':[39.2904,-76.6122],'Annapolis,MD':[38.9784,-76.4922],
            'Bethesda,MD':[38.9807,-77.1003],'Rockville,MD':[39.0840,-77.1528],
            'Gaithersburg,MD':[39.1434,-77.2011],'Silver Spring,MD':[38.9907,-77.0261],
            'Columbia,MD':[39.2037,-76.8610],'Frederick,MD':[39.4143,-77.4105],
            'Washington,DC':[38.9072,-77.0369],
            'Arlington,VA':[38.8799,-77.1068],'Alexandria,VA':[38.8048,-77.0469],
            'Richmond,VA':[37.5407,-77.4360],'Virginia Beach,VA':[36.8529,-75.9780],
            'Philadelphia,PA':[39.9526,-75.1652],'Pittsburgh,PA':[40.4406,-79.9959],
            'New York,NY':[40.7128,-74.0060],'Buffalo,NY':[42.8864,-78.8784],
            'Newark,NJ':[40.7357,-74.1724],'Atlantic City,NJ':[39.3643,-74.4229],
            'Atlanta,GA':[33.7490,-84.3880],'Miami,FL':[25.7617,-80.1918],
            'Tampa,FL':[27.9506,-82.4572],'Orlando,FL':[28.5383,-81.3792],
            'Houston,TX':[29.7604,-95.3698],'Austin,TX':[30.2672,-97.7431],
            'Dallas,TX':[32.7767,-96.7970],'San Antonio,TX':[29.4241,-98.4936],
            'Los Angeles,CA':[34.0522,-118.2437],'San Diego,CA':[32.7157,-117.1611],
            'San Francisco,CA':[37.7749,-122.4194],'Sacramento,CA':[38.5816,-121.4944],
            'Chicago,IL':[41.8781,-87.6298],'Columbus,OH':[39.9612,-82.9988],
            'Boston,MA':[42.3601,-71.0589],'Denver,CO':[39.7392,-104.9903],
            'Seattle,WA':[47.6062,-122.3321],'Charlotte,NC':[35.2271,-80.8431],
          }

          def get_coords(city, state):
            key = f"{city},{state}"
            if key in CITY_COORDS:
              return CITY_COORDS[key]
            return STATE_COORDS.get(state, [None, None])

          def normalize_distance(raw):
            if not raw: return None
            r = raw.lower().strip()
            if 'marathon' in r and 'half' not in r: return '26.2'
            if 'half' in r or '13.1' in r: return '13.1'
            if '10k' in r or r == '10 km': return '10K'
            if '5k' in r or r == '5 km': return '5K'
            if '10 mi' in r or '10mile' in r: return '10 mi'
            if '70.3' in r or 'half iron' in r: return '70.3'
            if '140.6' in r: return '140.6'
            if '50k' in r: return '50K'
            if '50m' in r or '50 mi' in r: return '50M'
            if '100k' in r: return '100K'
            if 'tri' in r: return 'Tri'
            return raw.strip()

          def test_supabase_connection():
            url = f"{SUPABASE_URL}/rest/v1/races?select=id&limit=1"
            req = urllib.request.Request(url, headers={
              'apikey': SERVICE_KEY,
              'Authorization': f'Bearer {SERVICE_KEY}',
            })
            try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                print(f"Supabase connection OK (status {resp.status})")
                return True
            except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Supabase connection FAILED: {e.code} {body}")
              return False
            except Exception as e:
              print(f"Supabase connection FAILED: {e}")
              return False

          def upsert_chunk(chunk):
            payload = json.dumps(chunk).encode('utf-8')
            url = f"{SUPABASE_URL}/rest/v1/races"
            req = urllib.request.Request(
              url,
              data=payload,
              headers={
                'apikey': SERVICE_KEY,
                'Authorization': f'Bearer {SERVICE_KEY}',
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal,resolution=merge-duplicates'
              },
              method='POST'
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                return len(chunk), 0, None
            except urllib.error.HTTPError as e:
              body = e.read().decode('utf-8')
              return 0, len(chunk), f"HTTP {e.code}: {body[:300]}"
            except Exception as e:
              return 0, len(chunk), str(e)

          # Test connection first
          print(f"Testing Supabase connection to {SUPABASE_URL}...")
          if not test_supabase_connection():
            sys.exit(1)

          today = date.today().isoformat()
          one_year = (date.today() + timedelta(days=365)).isoformat()

          total_added = 0
          total_errors = 0

          for state in STATES:
            state = state.strip()
            if not state:
              continue
            print(f"Syncing {state}...")
            state_added = 0
            state_errors = 0
            page = 1

            while page <= 20:
              url = (
                f"https://api.runsignup.com/rest/races"
                f"?api_key={RUNSIGNUP_KEY}&api_secret={RUNSIGNUP_SECRET}"
                f"&format=json&state={state}&results_per_page=100&page={page}"
                f"&start_date={today}&end_date={one_year}&include_event_details=T"
              )
              try:
                with urllib.request.urlopen(url, timeout=30) as resp:
                  data = json.loads(resp.read())
              except Exception as e:
                print(f"  Fetch error page {page}: {e}")
                break

              races = data.get('races', [])
              if not races:
                break

              print(f"  Page {page}: {len(races)} races")

              normalized = []
              for item in races:
                try:
                  race = item.get('race', item)
                  events = (race.get('next_date') or {}).get('events', []) or race.get('events', [])
                  first_event = events[0].get('event', events[0]) if events else {}

                  race_id = f"rs_{race.get('race_id', '')}"
                  name = race.get('name', '')
                  city = (race.get('address') or {}).get('city', '')
                  st = (race.get('address') or {}).get('state', state)
                  coords = get_coords(city, st)
                  dist_raw = first_event.get('distance', '') or first_event.get('name', '') or ''
                  distance = normalize_distance(dist_raw)

                  date_str = (race.get('next_date') or {}).get('start_time') or race.get('start_time')
                  date_sort = None
                  date_display = None
                  if date_str:
                    try:
                      d = datetime.fromisoformat(date_str.replace('Z', ''))
                      date_sort = d.strftime('%Y-%m-%d')
                      date_display = d.strftime('%b %-d, %Y')
                    except Exception:
                      pass

                  if not name or not date_sort:
                    continue

                  combined = f"{dist_raw} {name}".lower()
                  sport = 'Triathlon' if ('ironman' in combined or 'triathlon' in combined or '70.3' in combined) else 'Running'
                  reg_url = race.get('url') or f"https://runsignup.com/Race/{race.get('race_id', '')}"
                  location = f"{city}, {st}" if city and st else (st or city or '')

                  normalized.append({
                    'id': race_id,
                    'source': 'runsignup',
                    'name': name,
                    'location': location,
                    'city': city,
                    'state': st,
                    'lat': coords[0],
                    'lng': coords[1],
                    'distance': distance,
                    'distance_raw': dist_raw,
                    'date': date_display,
                    'date_sort': date_sort,
                    'terrain': 'Road',
                    'sport': sport,
                    'is_past': False,
                    'registration_url': reg_url,
                  })
                except Exception as e:
                  pass

              print(f"  Normalized: {len(normalized)} valid races")

              if normalized and not DRY_RUN:
                for i in range(0, len(normalized), 50):
                  chunk = normalized[i:i+50]
                  added, errors, err_msg = upsert_chunk(chunk)
                  if err_msg:
                    print(f"  UPSERT ERROR: {err_msg}")
                  else:
                    print(f"  Upserted chunk {i//50 + 1}: {added} rows")
                  state_added += added
                  state_errors += errors

              if len(races) < 100:
                break
              page += 1

            print(f"  {state} TOTAL: added={state_added} errors={state_errors}")
            total_added += state_added
            total_errors += state_errors

          print(f"=============================")
          print(f"Sync complete: added={total_added} errors={total_errors}")
          print(f"=============================")
          EOF

      - name: Run sync
        env:
          RUNSIGNUP_API_KEY: ${{ secrets.RUNSIGNUP_API_KEY }}
          RUNSIGNUP_API_SECRET: ${{ secrets.RUNSIGNUP_API_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_STATES: ${{ github.event.inputs.states }}
        run: python3 /tmp/sync.py
